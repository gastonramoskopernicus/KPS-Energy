<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Solar | KPS Energy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header id="main-header" class="scrolled">
        <div class="container">
            <nav class="navbar">
                <a href="index.html" class="logo">
                    <img src="assets/logo.png" alt="KPS Energy Logo"><div class="logo-text">KPS <span>Energy</span></div>
                </a>
                <div class="menu-toggle" id="mobile-menu">
                    <i class="fas fa-bars"></i>
                </div>
                <div class="nav-wrapper" id="nav-wrapper">
                    <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="empresa.html">Empresa</a></li>
                    <li><a href="soluciones.html">Soluciones</a></li>
                    <li><a href="productos.html">Productos</a></li>
                    <li><a href="blog.html">Blog</a></li>
                    <li><a href="calculadora.html">Calculadora Solar</a></li>
                </ul>
                <div class="nav-cta"><a href="contacto.html" class="btn btn-primary">Cotizar</a></div>
            </div>
            </nav>
        </div>
    </header>

    <main style="padding-top: 120px; padding-bottom: 100px; background: var(--bg-light);">
        <div class="container">
            <div
                style="max-width: 800px; margin: 0 auto; background: white; padding: 50px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05);">
                <div class="text-center" style="margin-bottom: 40px;">
                    <span class="section-tag">Simulador Energético</span>
                    <h1 style="font-size: 2rem; margin-bottom: 10px;">Calculadora de Ahorro Solar</h1>
                    <p style="color: var(--text-muted);">Obtené una estimación del sistema ideal según tu consumo actual
                        en Argentina.</p>
                </div>

                <!-- New Advanced Calculator Skeleton -->
                <div id="solar-calculator-app">
                    <div id="calc-stepper-nav" class="stepper-nav">
                        <!-- Step indicators injected here -->
                    </div>
                    <div id="calc-step-content" class="calc-content">
                        <div class="text-center" style="padding: 40px;">
                            <p>Cargando calculadora avanzada...</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer id="main-footer"></footer>
    <script src="script.js"></script>
    <script type="module" src="assets/js/calculator/main.js"></script>
    <script>

        // Load footer
        fetch('index.html').then(res => res.text()).then(html => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(html, 'text/html');
            document.getElementById('main-footer').innerHTML = doc.getElementById('main-footer').innerHTML;
        });
    </script>
</body>

</html>
